<script>
        // --- Mock Database Management ---
        const DB = {
            getUsers: () => JSON.parse(localStorage.getItem('mc_users') || '[]'),
            saveUser: (user) => {
                const users = DB.getUsers();
                users.push(user);
                localStorage.setItem('mc_users', JSON.stringify(users));
            },
            findUser: (email) => DB.getUsers().find(u => u.email === email),
            setCurrentUser: (user) => localStorage.setItem('currentUser', JSON.stringify(user)),
            getCurrentUser: () => JSON.parse(localStorage.getItem('currentUser')),
            logout: () => localStorage.removeItem('currentUser')
        };

        // --- DOM Elements ---
        const loginTabBtn = document.getElementById('login-tab-btn');
        const registerTabBtn = document.getElementById('register-tab-btn');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        
        const loginError = document.getElementById('login-error-msg');
        const registerError = document.getElementById('register-error-msg');

        const userProfileWidget = document.getElementById('user-profile-widget');
        const userProfileName = document.getElementById('user-profile-name');
        const loginBtnHeader = document.getElementById('login-btn-header');
        const logoutBtn = document.getElementById('logout-btn');

        const openMenuBtn = document.getElementById('open-menu');
        const closeMenuBtn = document.getElementById('close-menu');
        const mobileMenu = document.getElementById('mobile-menu');
        const mobileMenuDrawer = document.getElementById('mobile-menu-drawer');
        const mobileMenuBackdrop = document.getElementById('mobile-menu-backdrop');

        // --- Logic: Tabs Switching ---
        function showLogin() {
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            loginTabBtn.classList.add('bg-surface-container-highest', 'text-xp-green');
            loginTabBtn.classList.remove('bg-surface-container', 'text-on-surface-variant');
            registerTabBtn.classList.add('bg-surface-container', 'text-on-surface-variant');
            registerTabBtn.classList.remove('bg-surface-container-highest', 'text-xp-green');
            loginError.classList.add('hidden');
        }

        function showRegister() {
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            registerTabBtn.classList.add('bg-surface-container-highest', 'text-xp-green');
            registerTabBtn.classList.remove('bg-surface-container', 'text-on-surface-variant');
            loginTabBtn.classList.add('bg-surface-container', 'text-on-surface-variant');
            loginTabBtn.classList.remove('bg-surface-container-highest', 'text-xp-green');
            registerError.classList.add('hidden');
        }

        loginTabBtn.addEventListener('click', showLogin);
        registerTabBtn.addEventListener('click', showRegister);

        // --- Logic: Registration ---
        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;

            if (DB.findUser(email)) {
                registerError.innerText = "Email này đã được sử dụng.";
                registerError.classList.remove('hidden');
                return;
            }

            const newUser = { name, email, password };
            DB.saveUser(newUser);
            
            // Switch to login and pre-fill email
            showLogin();
            document.getElementById('login-email').value = email;
            loginError.innerText = "Đăng ký thành công! Vui lòng đăng nhập.";
            loginError.classList.remove('hidden');
            loginError.classList.replace('text-error', 'text-xp-green');
            registerForm.reset();
        });

        // --- Logic: Login ---
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            const user = DB.findUser(email);
            if (user && user.password === password) {
                DB.setCurrentUser(user);
                updateUIState();
                // Redirect or show success
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 500);
            } else {
                loginError.innerText = "Email hoặc mật khẩu không chính xác.";
                loginError.classList.remove('hidden');
                loginError.classList.replace('text-xp-green', 'text-error');
            }
        });

        // --- Logic: UI Update ---
        function updateUIState() {
            const user = DB.getCurrentUser();
            if (user) {
                loginBtnHeader.classList.add('hidden');
                userProfileWidget.classList.remove('hidden');
                userProfileWidget.classList.add('flex');
                userProfileName.innerText = user.name.toUpperCase();
                
                // If on mobile
                const mobileAuth = document.getElementById('mobile-auth-trigger');
                if(mobileAuth) mobileAuth.innerText = user.name.toUpperCase();
            } else {
                loginBtnHeader.classList.remove('hidden');
                userProfileWidget.classList.add('hidden');
                userProfileWidget.classList.remove('flex');
            }
        }

        logoutBtn.addEventListener('click', () => {
            DB.logout();
            updateUIState();
            window.location.reload();
        });

        // --- Logic: Navigation ---
        openMenuBtn.addEventListener('click', () => {
            mobileMenu.classList.remove('invisible', 'opacity-0');
            mobileMenuDrawer.classList.remove('translate-x-full');
        });

        const closeMenu = () => {
            mobileMenu.classList.add('opacity-0');
            mobileMenuDrawer.classList.add('translate-x-full');
            setTimeout(() => { mobileMenu.classList.add('invisible'); }, 300);
        };

        closeMenuBtn.addEventListener('click', closeMenu);
        mobileMenuBackdrop.addEventListener('click', closeMenu);

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            updateUIState();
        });
    </script>
